# ═══════════════════════════════════════════════════════════════
# CodeAutopsy — Production Docker Compose
# ═══════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Differences from dev compose:
#   • No source code volume mounts (uses built images)
#   • Ports bound to 127.0.0.1 only (Caddy proxies traffic)
#   • No --reload flag on uvicorn
#   • Memory limits enforced
#   • Database on separate persistent volume
#   • No root user overrides
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: codeautopsy-db
    restart: always
    environment:
      POSTGRES_DB: codeautopsy
      POSTGRES_USER: codeautopsy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in shell env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeautopsy -d codeautopsy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # Database is NOT exposed to host — only reachable by backend

  # ─── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: codeautopsy-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to point to the Docker-internal db service
      DATABASE_URL: postgresql+asyncpg://codeautopsy:${POSTGRES_PASSWORD:?err}@db:5432/codeautopsy
      REPOS_DIR: /repos_data
      ENV: production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - repos_data:/repos_data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --loop uvloop
      --http httptools
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1536M

  # ─── Frontend (Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeautopsy-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  pgdata:
    name: codeautopsy-pgdata
  repos_data:
    name: codeautopsy-repos

# ─── Networks ────────────────────────────────────────────────
networks:
  internal:
    name: codeautopsy-internal
    driver: bridge
